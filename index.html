<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebor</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' style='stop-color:%232ea6ff'/><stop offset='100%25' style='stop-color:%231a56e8'/></linearGradient></defs><circle cx='50' cy='50' r='48' fill='url(%23g)'/><path d='M30 35 L55 35 Q70 35 70 50 Q70 65 55 65 L42 65 L30 75 Z' fill='white' opacity='0.95'/><circle cx='45' cy='50' r='4' fill='%231a56e8'/><circle cx='58' cy='50' r='4' fill='%231a56e8'/></svg>">
    <style>
        :root{--b:#0e1621;--b2:#17212b;--b3:#242f3d;--a:#2ea6ff;--t:#fff;--t2:#8d969b;--g:#4caf50;--r:#e53935;--br:rgba(255,255,255,.08);--gold:#f0a500}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--b);color:var(--t);height:100vh;overflow:hidden}
        #app{height:100vh;display:flex}
        #loader{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--b);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .2s;color:var(--t2)}
        #loader.hidden{opacity:0;pointer-events:none}
        #loader i{width:40px;height:40px;border:3px solid var(--b3);border-top-color:var(--a);border-radius:50%;animation:s .5s linear infinite;display:block}
        @keyframes s{to{transform:rotate(360deg)}}
        .sidebar{width:380px;min-width:380px;background:var(--b2);border-right:1px solid var(--br);display:flex;flex-direction:column;transition:transform .2s}
        .sb-h{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--br);height:56px}
        .sb-h span{font-size:19px;font-weight:600}
        .ib{width:36px;height:36px;border-radius:50%;border:0;background:0;color:var(--t2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s}
        .ib:hover{background:var(--b3);color:var(--t)}
        .sw{padding:8px 12px}
        .sw input{width:100%;padding:9px 12px;background:var(--b);border:1px solid var(--br);border-radius:20px;color:var(--t);font-size:13px;outline:0}
        .sw input:focus{border-color:var(--a)}
        .cl{flex:1;overflow-y:auto}
        .ci{display:flex;align-items:center;padding:10px 12px;cursor:pointer;gap:10px;transition:background .1s}
        .ci:hover{background:var(--b3)}.ci.active{background:rgba(46,166,255,.12);border-left:3px solid var(--a)}
        .ca{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#2ea6ff,#1a73e8);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:19px;flex-shrink:0;overflow:hidden}
        .ca img{width:100%;height:100%;object-fit:cover}
        .cin{flex:1;min-width:0}.cn{font-weight:500;font-size:14px}.clm{color:var(--t2);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .ub{padding:8px 12px;background:var(--b);border-top:1px solid var(--br);display:flex;align-items:center;gap:8px;cursor:pointer}
        .ub:hover{background:var(--b3)}.ua{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#2ea6ff,#1a73e8);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px;overflow:hidden}
        .ua img{width:100%;height:100%;object-fit:cover}.ui{flex:1}.un{font-weight:500;font-size:13px}.uu{color:var(--t2);font-size:11px}
        .mc{flex:1;display:flex;flex-direction:column;background:var(--b)}
        .ch{padding:10px 16px;background:var(--b2);border-bottom:1px solid var(--br);display:flex;align-items:center;gap:10px;height:56px}
        .bb{display:none;background:0;border:0;color:var(--t2);font-size:20px;cursor:pointer}.cinf{flex:1}.cnm{font-weight:600;font-size:15px}.cst{color:var(--g);font-size:12px}
        .ma{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:4px}
        .em{text-align:center;margin:auto;color:var(--t2)}.em i{font-size:64px;display:block;margin-bottom:8px}.em h3{font-size:18px;margin-bottom:4px;color:var(--t)}
        .msg{display:flex;max-width:70%;animation:m .15s ease}@keyframes m{from{opacity:0;transform:translateY(6px)}}
        .msg.sent{align-self:flex-end}.msg.rec{align-self:flex-start}
        .mb{padding:8px 12px;border-radius:14px;line-height:1.4;word-wrap:break-word;font-size:14px}
        .msg.sent .mb{background:var(--a);color:#fff;border-bottom-right-radius:3px}.msg.rec .mb{background:var(--b3);border-bottom-left-radius:3px}
        .mt{font-size:10px;opacity:.65;margin-top:2px;text-align:right}
        .ia{padding:8px 12px;background:var(--b2);border-top:1px solid var(--br);display:flex;align-items:center;gap:6px}
        .ia input{flex:1;padding:10px 14px;background:var(--b);border:1px solid var(--br);border-radius:22px;color:var(--t);font-size:14px;outline:0}
        .ia input:focus{border-color:var(--a)}.sb-btn{width:40px;height:40px;border-radius:50%;background:var(--a);border:0;color:#fff;font-size:18px;cursor:pointer}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(2px)}
        .modal.on{display:flex}.mbox{background:var(--b2);border-radius:14px;padding:22px;width:92%;max-width:500px;animation:mi .2s ease;max-height:90vh;overflow-y:auto}
        @keyframes mi{from{opacity:0;transform:scale(.95) translateY(10px)}}
        .mbox h2{font-size:18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
        .mbox h2 button{background:0;border:0;color:var(--t2);font-size:22px;cursor:pointer}
        .fg{margin-bottom:12px}.fg label{display:block;color:var(--t2);font-size:11px;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
        .fg input,.fg textarea{width:100%;padding:10px 12px;background:var(--b);border:1px solid var(--br);border-radius:10px;color:var(--t);font-size:14px;outline:0;resize:vertical}
        .fg input:focus,.fg textarea:focus{border-color:var(--a)}
        .btn{width:100%;padding:12px;border:0;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:6px}
        .btn-a{background:var(--a);color:#fff}.btn-o{background:0;color:var(--a);border:2px solid var(--a)}.btn-r{background:0;color:var(--r);border:2px solid var(--r)}.btn-gold{background:var(--gold);color:#000}
        .err{color:var(--r);font-size:12px;margin-top:4px;display:none}.ok{color:var(--g);font-size:12px;margin-top:4px;display:none}
        .swt{text-align:center;margin-top:14px;color:var(--t2);font-size:13px}.swt a{color:var(--a);cursor:pointer}
        .si{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--br);cursor:pointer}
        .si-left{display:flex;align-items:center;gap:10px}.si-icon{font-size:20px;width:30px;text-align:center}.si-text{font-size:14px}.si-sub{color:var(--t2);font-size:12px}.si-arrow{color:var(--t2)}
        .av-up{width:80px;height:80px;border-radius:50%;background:var(--b3);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;cursor:pointer;overflow:hidden;position:relative;font-size:36px;font-weight:600}
        .av-up img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}.av-up input{display:none}
        .admin-table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
        .admin-table th,.admin-table td{padding:6px 4px;text-align:left;border-bottom:1px solid var(--br)}
        .admin-table th{color:var(--t2);font-size:10px;text-transform:uppercase}
        .admin-badge{background:var(--gold);color:#000;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--b3);border-radius:8px}
        @media(max-width:768px){.sidebar{position:fixed;left:0;top:0;height:100%;z-index:50;transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.bb{display:block}.mc{width:100%}}
    </style>
</head>
<body>
    <div id="loader"><i></i><p style="margin-top:12px">Facebor</p></div>
    <div id="app"></div>
    <script>
        'use strict';
        const ADMIN_KEY='facebor_admin_2026';
        let D={users:[],chats:[],messages:{},cu:null,ac:null,isAdmin:!1};
        const L=localStorage;
        function load(){const d=L.getItem('fb_fast');if(d)try{D=JSON.parse(d)}catch(e){}if(!D.users.length){D.users=[{id:1,name:'Анна',username:'anna',email:'anna@facebor.com',phone:'+79001234567',password:'123456',online:!0,avatar:'',bio:'Привет!',role:'user'},{id:2,name:'Петр',username:'petr',email:'petr@facebor.com',phone:'+79007654321',password:'123456',online:!1,avatar:'',bio:'',role:'user'},{id:3,name:'Мария',username:'maria',email:'maria@facebor.com',phone:'+79005551234',password:'123456',online:!0,avatar:'',bio:'Люблю общаться',role:'user'}];save()}}
        function save(){L.setItem('fb_fast',JSON.stringify(D))}
        function ft(t){const d=new Date(t),n=new Date();if(d.toDateString()===n.toDateString())return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});return d.toLocaleDateString('ru',{day:'numeric',month:'short'})}
        function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
        function getAv(u,s){if(u&&u.avatar)return'<img src="'+u.avatar+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';return u?u.name[0].toUpperCase():'?'}
        function render(){document.getElementById('loader').classList.add('hidden');const a=document.getElementById('app');D.cu?renderApp(a):renderAuth(a)}

        function renderAuth(a){a.innerHTML='<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100vh;background:var(--b);overflow-y:auto"><div style="background:var(--b2);border-radius:16px;padding:28px;width:92%;max-width:400px;text-align:center;margin:16px"><svg width="70" height="70" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:8px"><defs><linearGradient id="logoG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#2ea6ff"/><stop offset="100%" style="stop-color:#1a56e8"/></linearGradient></defs><circle cx="50" cy="50" r="48" fill="url(#logoG)"/><path d="M30 35 L55 35 Q70 35 70 50 Q70 65 55 65 L42 65 L30 75 Z" fill="white" opacity="0.95"/><circle cx="45" cy="50" r="4" fill="#1a56e8"/><circle cx="58" cy="50" r="4" fill="#1a56e8"/></svg><h1 style="font-size:24px;margin-bottom:2px">Facebor</h1><p style="color:var(--t2);margin-bottom:16px;font-size:13px">Общайтесь свободно</p><div id="lb"><div class="fg"><label>Email или Username</label><input id="lu" placeholder="email@example.com"></div><div class="fg"><label>Пароль</label><input id="lp" type="password" placeholder="Введите пароль"></div><div class="err" id="le"></div><button class="btn btn-a" onclick="login()">Войти</button><p style="margin:6px 0"><a onclick="fpModal()" style="color:var(--a);cursor:pointer;font-size:12px">Забыли пароль?</a></p><p class="swt">Нет аккаунта? <a onclick="ta()">Регистрация</a></p><p style="margin:6px 0"><a onclick="adminLoginModal()" style="color:var(--gold);cursor:pointer;font-size:11px">🔑 Вход для администратора</a></p><p style="color:var(--t2);font-size:10px;margin-top:10px">Демо: anna / 123456</p></div><div id="rb" style="display:none"><div class="fg"><label>Имя</label><input id="rn" placeholder="Ваше имя"></div><div class="fg"><label>Username</label><input id="ru" placeholder="Придумайте username"></div><div class="fg"><label>Email</label><input id="re" type="email" placeholder="your@gmail.com"></div><div class="fg"><label>Номер телефона</label><input id="rph" type="tel" placeholder="+79001234567"></div><div class="fg"><label>Пароль</label><input id="rp" type="password" placeholder="Минимум 6 символов"></div><div class="err" id="rerr"></div><button class="btn btn-a" onclick="register()">Создать аккаунт</button><p class="swt">Есть аккаунт? <a onclick="ta()">Войти</a></p></div></div></div>'}
        function ta(){const l=document.getElementById('lb'),r=document.getElementById('rb');l.style.display=l.style.display==='none'?'block':'none';r.style.display=r.style.display==='none'?'block':'none'}
        function login(){const u=document.getElementById('lu').value.trim().toLowerCase(),p=document.getElementById('lp').value,e=document.getElementById('le');e.style.display='none';const user=D.users.find(x=>(x.username===u||x.email===u)&&x.password===p);if(user){D.cu=user;D.isAdmin=user.role==='admin';save();render()}else{e.textContent='Неверный логин или пароль';e.style.display='block'}}
        function register(){const n=document.getElementById('rn').value.trim(),u=document.getElementById('ru').value.trim().toLowerCase(),em=document.getElementById('re').value.trim().toLowerCase(),ph=document.getElementById('rph').value.trim(),p=document.getElementById('rp').value,e=document.getElementById('rerr');e.style.display='none';if(!n||!u||!em||!p){e.textContent='Заполните обязательные поля';e.style.display='block';return}if(u.length<3){e.textContent='Username минимум 3 символа';e.style.display='block';return}if(!em.includes('@')||!em.includes('.')){e.textContent='Некорректный email';e.style.display='block';return}if(p.length<6){e.textContent='Пароль минимум 6 символов';e.style.display='block';return}if(D.users.find(x=>x.username===u)){e.textContent='Username занят';e.style.display='block';return}if(D.users.find(x=>x.email===em)){e.textContent='Email занят';e.style.display='block';return}const user={id:Date.now(),name:n,username:u,email:em,phone:ph||'',password:p,online:!0,avatar:'',bio:'',role:'user'};D.users.push(user);D.cu=user;save();render()}
        function fpModal(){const m=document.createElement('div');m.className='modal on';m.id='fpm';m.innerHTML='<div class="mbox"><h2>Восстановление <button onclick="cm(\'fpm\')">✕</button></h2><div class="fg"><label>Email или телефон</label><input id="fpe" placeholder="email или +7900..."></div><div class="err" id="fperr"></div><div class="ok" id="fpok"></div><button class="btn btn-a" onclick="rpReset()">Восстановить</button></div>';document.body.appendChild(m);m.onclick=e=>{if(e.target===m)cm('fpm')}}
        function rpReset(){const q=document.getElementById('fpe').value.trim().toLowerCase(),err=document.getElementById('fperr'),ok=document.getElementById('fpok');err.style.display='none';ok.style.display='none';const user=D.users.find(x=>x.email===q||x.phone===q);if(!user){err.textContent='Не найдено';err.style.display='block';return}ok.innerHTML='✅ Пароль: <b>'+user.password+'</b>';ok.style.display='block'}
        function adminLoginModal(){const m=document.createElement('div');m.className='modal on';m.id='alm';m.innerHTML='<div class="mbox"><h2>🔑 Админ-вход <button onclick="cm(\'alm\')">✕</button></h2><p style="color:var(--t2);font-size:12px;margin-bottom:12px">Введите секретный ключ администратора</p><div class="fg"><label>Admin Key</label><input id="admKey" type="password" placeholder="Введите ключ"></div><div class="err" id="admerr"></div><button class="btn btn-gold" onclick="adminLogin()">Войти как админ</button></div>';document.body.appendChild(m);m.onclick=e=>{if(e.target===m)cm('alm')}}
        function adminLogin(){const k=document.getElementById('admKey').value;if(k===ADMIN_KEY){const adm=D.users.find(x=>x.role==='admin');if(adm){D.cu=adm;D.isAdmin=!0;save();cm('alm');render()}else{const newAdm={id:Date.now(),name:'Администратор',username:'admin',email:'admin@facebor.com',phone:'',password:'admin123',online:!0,avatar:'',bio:'Администратор системы',role:'admin'};D.users.push(newAdm);D.cu=newAdm;D.isAdmin=!0;save();cm('alm');render()}}else{document.getElementById('admerr').textContent='Неверный ключ';document.getElementById('admerr').style.display='block'}}
        function renderApp(a){a.innerHTML='<div class="sidebar" id="sb"><div class="sb-h"><span>Facebor</span><div style="display:flex;gap:4px">'+adminBtns()+'<button class="ib" onclick="ncModal()">✏️</button><button class="ib" onclick="showSettings()">⚙️</button><button class="ib" onclick="logout()">🚪</button></div></div><div class="sw"><input type="text" placeholder="🔍 Поиск" oninput="fc(this.value)"></div><div class="cl" id="cl"></div><div class="ub" onclick="showProfile()"><div class="ua" id="ubAv">'+getAv(D.cu,'34px')+'</div><div class="ui"><div class="un">'+D.cu.name+(D.isAdmin?' <span class="admin-badge">ADMIN</span>':'')+'</div><div class="uu">@'+D.cu.username+'</div></div></div></div><div class="mc" id="mc">'+rm()+'</div>';uc();bi()}
        function adminBtns(){return D.isAdmin?'<button class="ib" onclick="adminPanel()" style="color:var(--gold)">🛡️</button>':''}
        function adminPanel(){const m=document.createElement('div');m.className='modal on';m.id='admp';m.innerHTML='<div class="mbox" style="max-width:600px"><h2>🛡️ Админ-панель <button onclick="cm(\'admp\')">✕</button></h2><div style="margin-bottom:16px"><button class="btn btn-gold" onclick="showAllUsers()">👥 Все пользователи ('+D.users.length+')</button><button class="btn btn-gold" onclick="showAllMessages()">💬 Все сообщения</button><button class="btn btn-gold" onclick="addDemoUsers()">➕ Добавить демо-пользователей</button><button class="btn btn-r" onclick="clearAllData()">🗑️ Очистить всё</button></div><div id="adminContent" style="font-size:13px"></div></div>';document.body.appendChild(m);m.onclick=e=>{if(e.target===m)cm('admp')}}
        function showAllUsers(){const c=document.getElementById('adminContent');c.innerHTML='<h4 style="margin-bottom:8px">👥 Пользователи</h4><table class="admin-table"><tr><th>ID</th><th>Аватар</th><th>Имя</th><th>Username</th><th>Email</th><th>Телефон</th><th>Пароль</th><th>Роль</th><th>Действия</th></tr>'+D.users.map(u=>'<tr><td>'+u.id+'</td><td>'+getAv(u,'24px')+'</td><td>'+u.name+'</td><td>@'+u.username+'</td><td>'+u.email+'</td><td>'+(u.phone||'-')+'</td><td>'+u.password+'</td><td>'+u.role+'</td><td><button class="btn btn-r" style="padding:4px 8px;font-size:10px" onclick="delUser('+u.id+')">Удалить</button></td></tr>').join('')+'</table>'}
        function showAllMessages(){const c=document.getElementById('adminContent');let all='<h4 style="margin-bottom:8px">💬 Все сообщения</h4>';Object.keys(D.messages).forEach(chatId=>{const ms=D.messages[chatId];if(ms.length){const chat=D.chats.find(x=>x.id===parseInt(chatId));if(chat){const u1=D.users.find(x=>x.id===chat.participants[0]);const u2=D.users.find(x=>x.id===chat.participants[1]);all+='<p style="color:var(--a);margin-top:8px">'+u1.name+' ↔ '+u2.name+'</p>';ms.forEach(m=>{const s=D.users.find(x=>x.id===m.senderId);all+='<p style="font-size:11px;color:var(--t2)"><b>'+(s?s.name:'?')+'</b>: '+m.text+'</p>'})}}});c.innerHTML=all||'<p>Нет сообщений</p>'}
        function addDemoUsers(){const demos=[{id:Date.now()+1,name:'Дмитрий',username:'dmitry',email:'dmitry@facebor.com',phone:'+79001112233',password:'123456',online:!0,avatar:'',bio:'',role:'user'},{id:Date.now()+2,name:'Елена',username:'elena',email:'elena@facebor.com',phone:'+79004445566',password:'123456',online:!0,avatar:'',bio:'',role:'user'}];demos.forEach(u=>{if(!D.users.find(x=>x.username===u.username))D.users.push(u)});save();showAllUsers();alert('Добавлено 2 демо-пользователя!')}
        function delUser(id){if(confirm('Удалить пользователя #'+id+'?')){D.users=D.users.filter(x=>x.id!==id);D.chats=D.chats.filter(c=>!c.participants.includes(id));Object.keys(D.messages).forEach(k=>{if(D.chats.find(c=>c.id===parseInt(k))){}else delete D.messages[k]});save();showAllUsers()}}
        function clearAllData(){if(confirm('Удалить ВСЕ данные?')){D.users=[];D.chats=[];D.messages={};D.cu=null;D.ac=null;save();render()}}
        function rm(){if(!D.ac)return'<div class="ch"><div class="cinf"><div class="cnm">Facebor</div><div class="cst">Выберите чат</div></div></div><div class="ma"><div class="em"><i>💬</i><h3>Добро пожаловать!</h3><p>Выберите чат</p></div></div>';const c=D.chats.find(x=>x.id===D.ac);if(!c)return'';const oId=c.participants.find(id=>id!==D.cu.id);const o=D.users.find(u=>u.id===oId);const ms=D.messages[D.ac]||[];return'<div class="ch"><button class="bb" onclick="cc()">←</button><div class="ca" style="width:38px;height:38px;font-size:16px">'+getAv(o,'38px')+'</div><div class="cinf"><div class="cnm">'+o.name+'</div><div class="cst">'+(o.online?'● online':'○ был недавно')+'</div></div></div><div class="ma" id="mc2">'+ms.map(m=>{const s=m.senderId===D.cu.id;return'<div class="msg '+(s?'sent':'rec')+'"><div class="mb">'+esc(m.text)+'<div class="mt">'+ft(m.time)+'</div></div></div>'}).join('')+'</div><div class="ia"><input type="text" id="mi" placeholder="Сообщение..."><button class="sb-btn" onclick="sm()">➤</button></div>'}
        function uc(){const l=document.getElementById('cl');if(!l)return;const chats=D.chats.filter(x=>x.participants.includes(D.cu.id));l.innerHTML=chats.map(c=>{const oId=c.participants.find(id=>id!==D.cu.id);const o=D.users.find(u=>u.id===oId);const ms=D.messages[c.id]||[],last=ms[ms.length-1];return'<div class="ci'+(D.ac===c.id?' active':'')+'" onclick="oc('+c.id+')"><div class="ca" style="font-size:16px">'+getAv(o,'46px')+'</div><div class="cin"><div class="cn">'+o.name+'</div><div class="clm">'+(last?last.text:'Нет сообщений')+'</div></div></div>'}).join('')}
        function oc(id){D.ac=id;document.getElementById('mc').innerHTML=rm();uc();sd();bi();if(window.innerWidth<=768)document.getElementById('sb').classList.remove('open')}
        function cc(){D.ac=null;document.getElementById('mc').innerHTML=rm();uc()}
        function sm(){const inp=document.getElementById('mi');if(!inp||!D.ac)return;const t=inp.value.trim();if(!t)return;if(!D.messages[D.ac])D.messages[D.ac]=[];D.messages[D.ac].push({senderId:D.cu.id,text:t,time:new Date().toISOString()});save();inp.value='';document.getElementById('mc').innerHTML=rm();sd();bi();uc()}
        function sd(){setTimeout(()=>{const c=document.getElementById('mc2');if(c)c.scrollTop=c.scrollHeight},50)}
        function bi(){const inp=document.getElementById('mi');if(inp){inp.focus();inp.onkeypress=e=>{if(e.key==='Enter')sm()}}}
        function fc(q){document.querySelectorAll('.ci').forEach(i=>{i.style.display=i.querySelector('.cn').textContent.toLowerCase().includes(q.toLowerCase())?'flex':'none'})}
        function ncModal(){const m=document.createElement('div');m.className='modal on';m.id='ncm';m.innerHTML='<div class="mbox"><h2>Новый чат <button onclick="cm(\'ncm\')">✕</button></h2><div class="fg"><label>Username, Email или Телефон</label><input id="ncu" placeholder="username, email или +7900..."></div><div class="err" id="nce"></div><button class="btn btn-a" onclick="sc()">Начать чат</button></div>';document.body.appendChild(m);m.onclick=e=>{if(e.target===m)cm('ncm')}}
        function sc(){const q=document.getElementById('ncu').value.trim().toLowerCase(),o=D.users.find(x=>x.username===q||x.email===q||x.phone===q),e=document.getElementById('nce');if(!o){e.textContent='Пользователь не найден';e.style.display='block';return}if(o.id===D.cu.id){e.textContent='Это ваш аккаунт';e.style.display='block';return}const ex=D.chats.find(c=>c.participants.includes(D.cu.id)&&c.participants.includes(o.id));if(ex){oc(ex.id);cm('ncm');return}const nc={id:Date.now(),participants:[D.cu.id,o.id]};D.chats.push(nc);D.messages[nc.id]=[];save();oc(nc.id);cm('ncm')}
        function cm(id){const m=document.getElementById(id);if(m)m.remove()}
        function logout(){D.cu=null;D.ac=null;D.isAdmin=!1;save();render()}
        function showProfile(){const m=document.createElement('div');m.className='modal on';m.id='prm';const u=D.cu;m.innerHTML='<div class="mbox"><h2>Профиль <button onclick="cm(\'prm\')">✕</button></h2><div class="av-up" onclick="document.getElementById(\'avIn\').click()">'+(u.avatar?'<img src="'+u.avatar+'">':u.name[0].toUpperCase())+'<input type="file" id="avIn" accept="image/*" onchange="upAv(event)"></div><p style="text-align:center;color:var(--a);font-size:12px;margin-bottom:16px">Нажмите, чтобы изменить аватар</p><div class="fg"><label>Имя</label><input value="'+u.name+'" readonly></div><div class="fg"><label>Username</label><input value="@'+u.username+'" readonly></div><div class="fg"><label>Email</label><input value="'+u.email+'" readonly></div><div class="fg"><label>Телефон</label><input value="'+(u.phone||'Не указан')+'" readonly></div><div class="fg"><label>О себе</label><input value="'+(u.bio||'')+'" readonly></div><button class="btn btn-o" onclick="cm(\'prm\');showSettings()">⚙️ Редактировать</button></div>';document.body.appendChild(m);m.onclick=e=>{if(e.target===m)cm('prm')}}
        function upAv(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){D.cu.avatar=ev.target.result;save();const el=document.getElementById('prm');if(el)el.querySelector('.av-up').innerHTML='<img src="'+ev.target.result+'"><input type="file" id="avIn" accept="image/*" onchange="upAv(event)">';const ub=document.getElementById('ubAv');if(ub)ub.innerHTML=getAv(D.cu,'34px');uc()};r.readAsDataURL(f)}
        function showSettings(){const m=document.createElement('div');m.className='modal on';m.id='stm';const u=D.cu;m.innerHTML='<div class="mbox"><h2>⚙️ Настройки <button onclick="cm(\'stm\')">✕</button></h2><div class="si" onclick="cm(\'stm\');editProfile()"><div class="si-left"><div class="si-icon">👤</div><div><div class="si-text">Редактировать профиль</div><div class="si-sub">Имя, фото, описание</div></div></div><div class="si-arrow">›</div></div><div class="si" onclick="cm(\'stm\');changePhone()"><div class="si-left"><div class="si-icon">📱</div><div><div class="si-text">Номер телефона</div><div class="si-sub">'+(u.phone||'Не указан')+'</div></div></div><div class="si-arrow">›</div></div><div class="si" onclick="cm(\'stm\');changePass()"><div class="si-left"><div class="si-icon">🔒</div><div><div class="si-text">Сменить пароль</div><div class="si-sub">Безопасность</div></div></div><div class="si-arrow">›</div></div><div class="si" onclick="cm(\'stm\');changeEmail()"><div class="si-left"><div class="si-icon">📧</div><div><div class="si-text">Email</div><div class="si-sub">'+u.email+'</div></div></div><div class="si-arrow">›</div></div><div class="si" onclick="deleteAcc()"><div class="si-left"><div class="si-icon" style="color:var(--r)">⚠️</div><div style="color:var(--r)"><div class="si-text" style="color:var(--r)">Удалить аккаунт</div><div class="si-sub">Необратимо</div></div></div><div class="si-arrow" style="color:var(--r)">›</div></div></div>';document.body.appendChild(m);m.onclick=e=>{if(e.target===m)cm('stm')}}
        function editProfile(){const m=document.createElement('div');m.className='modal on';m.id='epm';const u=D.cu;m.innerHTML='<div class="mbox"><h2>Редактировать <button onclick="cm(\'epm\')">✕</button></h2><div class="av-up" onclick="document.getElementById(\'epAv\').click()">'+(u.avatar?'<img src="'+u.avatar+'">':u.name[0].toUpperCase())+'<input type="file" id="epAv" accept="image/*"></div><div class="fg"><label>Имя</label><input id="epName" value="'+u.name+'"></div><div class="fg"><label>О себе</label><input id="epBio" value="'+(u.bio||'')+'"></div><div class="err" id="eperr"></div><button class="btn btn-a" onclick="saveProf()">Сохранить</button></div>';document.body.appendChild(m);m.onclick=e=>{if(e.target===m)cm('epm')}}
        function saveProf(){const n=document.getElementById('epName').value.trim();const b=document.getElementById('epBio').value.trim();if(!n){document.getElementById('eperr').textContent='Имя обязательно';document.getElementById('eperr').style.display='block';return}D.cu.name=n;D.cu.bio=b;const f=document.getElementById('epAv');if(f&&f.files[0]){const r=new FileReader();r.onload=function(ev){D.cu.avatar=ev.target.result;save();cm('epm');render()};r.readAsDataURL(f.files[0])}else{save();cm('epm');render()}}
        function changePhone(){const m=document.createElement('div');m.className='modal on';m.id='phm';m.innerHTML='<div class="mbox"><h2>Телефон <button onclick="cm(\'phm\')">✕</button></h2><div class="fg"><label>Номер</label><input id="phNum" value="'+(D.cu.phone||'')+'" placeholder="+79001234567"></div><button class="btn btn-a" onclick="savePh()">Сохранить</button></div>';document.body.appendChild(m);m.onclick=e=>{if(e.target===m)cm('phm')}}
        function savePh(){const p=document.getElementById('phNum').value.trim();D.cu.phone=p;save();cm('phm');render()}
        function changePass(){const m=document.createElement('div');m.className='modal on';m.id='cpm';m.innerHTML='<div class="mbox"><h2>Смена пароля <button onclick="cm(\'cpm\')">✕</button></h2><div class="fg"><label>Старый пароль</label><input id="cpOld" type="password"></div><div class="fg"><label>Новый пароль</label><input id="cpNew" type="password"></div><div class="err" id="cperr"></div><button class="btn btn-a" onclick="savePass()">Сохранить</button></div>';document.body.appendChild(m);m.onclick=e=>{if(e.target===m)cm('cpm')}}
        function savePass(){const o=document.getElementById('cpOld').value;const n=document.getElementById('cpNew').value;const e=document.getElementById('cperr');if(o!==D.cu.password){e.textContent='Неверный старый пароль';e.style.display='block';return}if(n.length<6){e.textContent='Минимум 6 символов';e.style.display='block';return}D.cu.password=n;save();cm('cpm');alert('Пароль изменён!')}
        function changeEmail(){const m=document.createElement('div');m.className='modal on';m.id='cem';m.innerHTML='<div class="mbox"><h2>Email <button onclick="cm(\'cem\')">✕</button></h2><div class="fg"><label>Новый Email</label><input id="cemail" value="'+D.cu.email+'"></div><div class="err" id="ceerr"></div><button class="btn btn-a" onclick="saveEm()">Сохранить</button></div>';document.body.appendChild(m);m.onclick=e=>{if(e.target===m)cm('cem')}}
        function saveEm(){const em=document.getElementById('cemail').value.trim();if(!em.includes('@')){document.getElementById('ceerr').textContent='Некорректный email';document.getElementById('ceerr').style.display='block';return}D.cu.email=em;save();cm('cem');render()}
        function deleteAcc(){if(confirm('Удалить аккаунт навсегда?')){D.users=D.users.filter(x=>x.id!==D.cu.id);D.cu=null;D.ac=null;save();render()}}

        load();requestAnimationFrame(()=>{render()});
    </script>
</body>
</html>
