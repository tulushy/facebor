<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebor</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
    <style>
        :root {
            --bg: #0e1621;
            --bg2: #17212b;
            --bg3: #242f3d;
            --accent: #2ea6ff;
            --text: #fff;
            --text2: #8d969b;
            --green: #4caf50;
            --border: rgba(255,255,255,.08);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:var(--bg);
            color:var(--text);
            height:100vh;
            overflow:hidden;
            -webkit-font-smoothing:antialiased;
            -webkit-tap-highlight-color:transparent;
        }
        #app{height:100vh;display:flex}

        /* LOADER */
        #loader{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:var(--bg);z-index:9999;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            transition:opacity .3s;color:var(--text2);
        }
        #loader.hidden{opacity:0;pointer-events:none}
        #loader div{
            width:44px;height:44px;border:3px solid var(--bg3);
            border-top-color:var(--accent);border-radius:50%;
            animation:spin .6s linear infinite;
        }
        @keyframes spin{to{transform:rotate(360deg)}}

        /* SIDEBAR */
        .sidebar{
            width:380px;min-width:380px;background:var(--bg2);
            border-right:1px solid var(--border);display:flex;flex-direction:column;
            transition:transform .25s cubic-bezier(.4,0,.2,1);will-change:transform;
        }
        .sb-header{
            padding:14px 18px;display:flex;align-items:center;justify-content:space-between;
            border-bottom:1px solid var(--border);
        }
        .sb-header span{font-size:20px;font-weight:600}
        .sb-actions{display:flex;gap:6px}
        .icon-btn{
            width:38px;height:38px;border-radius:50%;border:none;
            background:0;color:var(--text2);font-size:18px;
            cursor:pointer;display:flex;align-items:center;justify-content:center;
            transition:background .15s;
        }
        .icon-btn:hover{background:var(--bg3);color:var(--text)}
        .search-wrap{padding:10px 14px}
        .search-wrap input{
            width:100%;padding:10px 14px;background:var(--bg);
            border:1px solid var(--border);border-radius:22px;
            color:var(--text);font-size:14px;outline:none;transition:border .2s;
        }
        .search-wrap input:focus{border-color:var(--accent)}
        .search-wrap input::placeholder{color:var(--text2)}
        .chat-list{flex:1;overflow-y:auto;will-change:scroll-position}
        .chat-item{
            display:flex;align-items:center;padding:12px 14px;
            cursor:pointer;gap:12px;transition:background .15s;
        }
        .chat-item:hover{background:var(--bg3)}
        .chat-item.active{background:rgba(46,166,255,.15);border-left:3px solid var(--accent)}
        .chat-avatar{
            width:50px;height:50px;border-radius:50%;
            background:linear-gradient(135deg,#2ea6ff,#1a73e8);
            display:flex;align-items:center;justify-content:center;
            font-weight:600;font-size:20px;flex-shrink:0;
        }
        .chat-info{flex:1;min-width:0}
        .chat-name{font-weight:500;font-size:15px;margin-bottom:3px}
        .chat-last{color:var(--text2);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .chat-meta{text-align:right;flex-shrink:0}
        .chat-time{color:var(--text2);font-size:11px}
        .user-bar{
            padding:10px 14px;background:var(--bg);border-top:1px solid var(--border);
            display:flex;align-items:center;gap:10px;
        }
        .user-av{
            width:38px;height:38px;border-radius:50%;
            background:linear-gradient(135deg,#2ea6ff,#1a73e8);
            display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;
        }
        .user-inf{flex:1}
        .user-name{font-weight:500;font-size:14px}
        .user-username{color:var(--text2);font-size:12px}

        /* MAIN CHAT */
        .main-chat{flex:1;display:flex;flex-direction:column;background:var(--bg)}
        .chat-header{
            padding:12px 18px;background:var(--bg2);border-bottom:1px solid var(--border);
            display:flex;align-items:center;gap:12px;
        }
        .back-btn{display:none;background:0;border:0;color:var(--text2);font-size:22px;cursor:pointer}
        .ch-info{flex:1}
        .ch-name{font-weight:600;font-size:16px}
        .ch-status{color:var(--green);font-size:13px}
        .msg-area{
            flex:1;overflow-y:auto;padding:16px;
            display:flex;flex-direction:column;gap:6px;
            will-change:scroll-position;
        }
        .empty{
            text-align:center;margin:auto;color:var(--text2);
        }
        .empty-icon{font-size:72px;margin-bottom:12px}
        .empty h3{font-size:20px;margin-bottom:6px;color:var(--text)}
        .msg{display:flex;max-width:72%;animation:msgIn .2s ease}
        @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .msg.sent{align-self:flex-end}
        .msg.received{align-self:flex-start}
        .msg-bubble{
            padding:10px 14px;border-radius:16px;line-height:1.5;
            word-wrap:break-word;font-size:15px;
        }
        .msg.sent .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
        .msg.received .msg-bubble{background:var(--bg3);border-bottom-left-radius:4px}
        .msg-time{font-size:11px;opacity:.7;margin-top:3px;text-align:right}
        .input-area{
            padding:10px 16px;background:var(--bg2);border-top:1px solid var(--border);
            display:flex;align-items:center;gap:8px;
        }
        .input-area input{
            flex:1;padding:12px 16px;background:var(--bg);
            border:1px solid var(--border);border-radius:24px;
            color:var(--text);font-size:15px;outline:none;transition:border .2s;
        }
        .input-area input:focus{border-color:var(--accent)}
        .input-area input::placeholder{color:var(--text2)}
        .send-btn{
            width:44px;height:44px;border-radius:50%;
            background:var(--accent);border:0;color:#fff;
            font-size:20px;cursor:pointer;flex-shrink:0;
            transition:transform .15s,background .15s;
        }
        .send-btn:hover{background:#3cb4ff;transform:scale(1.05)}
        .send-btn:active{transform:scale(.95)}

        /* MODAL */
        .modal{
            display:none;position:fixed;top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,.55);z-index:1000;
            justify-content:center;align-items:center;
            backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
        }
        .modal.active{display:flex}
        .modal-box{
            background:var(--bg2);border-radius:16px;padding:26px;
            width:92%;max-width:400px;animation:modIn .25s ease;
        }
        @keyframes modIn{from{opacity:0;transform:scale(.9) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
        .modal-box h2{font-size:20px;margin-bottom:20px;display:flex;justify-content:space-between}
        .modal-box h2 button{background:0;border:0;color:var(--text2);font-size:24px;cursor:pointer}
        .modal-box h2 button:hover{color:var(--text)}
        .f-group{margin-bottom:14px}
        .f-group input{
            width:100%;padding:12px 14px;background:var(--bg);
            border:1px solid var(--border);border-radius:12px;
            color:var(--text);font-size:15px;outline:none;transition:border .2s;
        }
        .f-group input:focus{border-color:var(--accent)}
        .f-group input::placeholder{color:var(--text2)}
        .btn{
            width:100%;padding:14px;border:0;border-radius:12px;
            font-size:16px;font-weight:600;cursor:pointer;transition:background .15s;
        }
        .btn-accent{background:var(--accent);color:#fff}
        .btn-accent:hover{background:#3cb4ff}
        .err{color:#e53935;font-size:13px;margin-top:6px;display:none}
        .switch-text{text-align:center;margin-top:16px;color:var(--text2);font-size:14px}
        .switch-text a{color:var(--accent);cursor:pointer}
        .switch-text a:hover{text-decoration:underline}

        /* SCROLLBAR */
        ::-webkit-scrollbar{width:5px}
        ::-webkit-scrollbar-track{background:0}
        ::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:10px}

        @media(max-width:768px){
            .sidebar{position:fixed;left:0;top:0;height:100%;z-index:50;transform:translateX(-100%)}
            .sidebar.open{transform:translateX(0)}
            .back-btn{display:block}
            .main-chat{width:100%}
        }
    </style>
</head>
<body>
    <div id="loader"><div></div><p>Facebor</p></div>
    <div id="app"></div>

    <script>
        // FACEBOOK OPTIMIZED - ALL IN ONE FILE
        'use strict';

        // DATA
        let D={users:[],chats:[],messages:{},currentUser:null,activeChat:null};
        const S=localStorage;

        function load(){
            const d=S.getItem('fb_db');
            if(d){D=JSON.parse(d)}
            if(!D.users.length){
                D.users=[
                    {id:1,name:'Анна',username:'anna',password:'123456',online:true},
                    {id:2,name:'Петр',username:'petr',password:'123456',online:false},
                    {id:3,name:'Мария',username:'maria',password:'123456',online:true}
                ];
                save();
            }
        }

        function save(){S.setItem('fb_db',JSON.stringify(D))}

        function fmtTime(t){
            const d=new Date(t),n=new Date();
            if(d.toDateString()===n.toDateString())return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
            return d.toLocaleDateString('ru',{day:'numeric',month:'short'});
        }

        // RENDER
        function render(){
            document.getElementById('loader').classList.add('hidden');
            const app=document.getElementById('app');
            if(!D.currentUser)renderAuth(app);else renderApp(app);
        }

        function renderAuth(app){
            app.innerHTML=`
                <div style="display:flex;align-items:center;justify-content:center;width:100%;height:100vh;background:var(--bg)">
                    <div style="background:var(--bg2);border-radius:20px;padding:36px;width:92%;max-width:380px;text-align:center">
                        <div style="font-size:56px;margin-bottom:12px">💬</div>
                        <h1 style="font-size:26px;margin-bottom:4px">Facebor</h1>
                        <p style="color:var(--text2);margin-bottom:20px;font-size:14px">Общайтесь свободно</p>
                        <div id="loginBlock">
                            <div class="f-group"><input id="lUser" placeholder="Username" style="text-align:center" autocomplete="off"></div>
                            <div class="f-group"><input id="lPass" type="password" placeholder="Пароль" style="text-align:center"></div>
                            <div class="err" id="lErr"></div>
                            <button class="btn btn-accent" onclick="login()" style="margin-bottom:10px">Войти</button>
                            <p class="switch-text">Нет аккаунта? <a onclick="toggleAuth()">Регистрация</a></p>
                            <p style="color:var(--text2);font-size:11px;margin-top:12px">Демо: anna / 123456</p>
                        </div>
                        <div id="regBlock" style="display:none">
                            <div class="f-group"><input id="rName" placeholder="Имя" style="text-align:center"></div>
                            <div class="f-group"><input id="rUser" placeholder="Username" style="text-align:center"></div>
                            <div class="f-group"><input id="rPass" type="password" placeholder="Пароль" style="text-align:center"></div>
                            <div class="err" id="rErr"></div>
                            <button class="btn btn-accent" onclick="register()" style="margin-bottom:10px">Создать аккаунт</button>
                            <p class="switch-text">Есть аккаунт? <a onclick="toggleAuth()">Войти</a></p>
                        </div>
                    </div>
                </div>`;
        }

        function toggleAuth(){
            const l=document.getElementById('loginBlock'),r=document.getElementById('regBlock');
            l.style.display=l.style.display==='none'?'block':'none';
            r.style.display=r.style.display==='none'?'block':'none';
        }

        function login(){
            const u=document.getElementById('lUser').value.trim(),p=document.getElementById('lPass').value;
            const user=D.users.find(x=>x.username===u&&x.password===p);
            if(user){D.currentUser=user;save();render();}
            else{const e=document.getElementById('lErr');e.textContent='Неверный логин или пароль';e.style.display='block'}
        }

        function register(){
            const n=document.getElementById('rName').value.trim(),
                  u=document.getElementById('rUser').value.trim(),
                  p=document.getElementById('rPass').value;
            const e=document.getElementById('rErr');
            if(!n||!u||!p){e.textContent='Заполните все поля';e.style.display='block';return}
            if(D.users.find(x=>x.username===u)){e.textContent='Username занят';e.style.display='block';return}
            const user={id:Date.now(),name:n,username:u,password:p,online:true};
            D.users.push(user);D.currentUser=user;save();render();
        }

        function renderApp(app){
            app.innerHTML=`
                <div class="sidebar" id="sidebar">
                    <div class="sb-header">
                        <span>Facebor</span>
                        <div class="sb-actions">
                            <button class="icon-btn" onclick="newChatModal()" title="Новый чат">✏️</button>
                            <button class="icon-btn" onclick="logout()" title="Выйти">🚪</button>
                        </div>
                    </div>
                    <div class="search-wrap"><input type="text" placeholder="🔍 Поиск" oninput="filterChats(this.value)"></div>
                    <div class="chat-list" id="chatList"></div>
                    <div class="user-bar">
                        <div class="user-av">${D.currentUser.name[0].toUpperCase()}</div>
                        <div class="user-inf"><div class="user-name">${D.currentUser.name}</div><div class="user-username">@${D.currentUser.username}</div></div>
                        <span style="color:var(--green);font-size:12px">● online</span>
                    </div>
                </div>
                <div class="main-chat" id="mainChat">${renderMain()}</div>`;
            updateChats();
            bindInput();
        }

        function renderMain(){
            if(!D.activeChat)return `
                <div class="chat-header"><div class="ch-info"><div class="ch-name">Facebor</div><div class="ch-status">Общайтесь свободно</div></div></div>
                <div class="msg-area"><div class="empty"><div class="empty-icon">💬</div><h3>Добро пожаловать!</h3><p>Выберите чат или создайте новый</p></div></div>`;
            const chat=D.chats.find(c=>c.id===D.activeChat);
            if(!chat)return '';
            const oId=chat.participants.find(id=>id!==D.currentUser.id);
            const oUser=D.users.find(u=>u.id===oId);
            const msgs=D.messages[D.activeChat]||[];
            return `
                <div class="chat-header">
                    <button class="back-btn" onclick="closeChat()">←</button>
                    <div class="chat-avatar" style="width:42px;height:42px;font-size:18px">${oUser.name[0]}</div>
                    <div class="ch-info"><div class="ch-name">${oUser.name}</div><div class="ch-status">${oUser.online?'● online':'○ был недавно'}</div></div>
                </div>
                <div class="msg-area" id="msgContainer">${msgs.map(m=>{
                    const sent=m.senderId===D.currentUser.id;
                    return `<div class="msg ${sent?'sent':'received'}"><div class="msg-bubble">${esc(m.text)}<div class="msg-time">${fmtTime(m.time)}</div></div></div>`;
                }).join('')}</div>
                <div class="input-area">
                    <input type="text" id="msgInput" placeholder="Сообщение...">
                    <button class="send-btn" onclick="sendMsg()">➤</button>
                </div>`;
        }

        function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

        function updateChats(){
            const list=document.getElementById('chatList');
            if(!list)return;
            const chats=D.chats.filter(c=>c.participants.includes(D.currentUser.id));
            list.innerHTML=chats.map(c=>{
                const oId=c.participants.find(id=>id!==D.currentUser.id);
                const o=D.users.find(u=>u.id===oId);
                const ms=D.messages[c.id]||[];
                const last=ms[ms.length-1];
                return `<div class="chat-item${D.activeChat===c.id?' active':''}" onclick="openChat(${c.id})">
                    <div class="chat-avatar">${o.name[0]}</div>
                    <div class="chat-info"><div class="chat-name">${o.name}</div><div class="chat-last">${last?last.text:'Нет сообщений'}</div></div>
                    <div class="chat-meta"><div class="chat-time">${last?fmtTime(last.time):''}</div></div>
                </div>`;
            }).join('');
        }

        function openChat(id){
            D.activeChat=id;
            document.getElementById('mainChat').innerHTML=renderMain();
            updateChats();
            scrollDown();
            bindInput();
            if(window.innerWidth<=768)document.getElementById('sidebar').classList.remove('open');
        }

        function closeChat(){D.activeChat=null;document.getElementById('mainChat').innerHTML=renderMain();updateChats()}

        function sendMsg(){
            const inp=document.getElementById('msgInput');
            if(!inp||!D.activeChat)return;
            const text=inp.value.trim();
            if(!text)return;
            if(!D.messages[D.activeChat])D.messages[D.activeChat]=[];
            D.messages[D.activeChat].push({senderId:D.currentUser.id,text,time:new Date().toISOString()});
            save();inp.value='';
            document.getElementById('mainChat').innerHTML=renderMain();
            scrollDown();
            bindInput();
            updateChats();
        }

        function scrollDown(){
            setTimeout(()=>{
                const c=document.getElementById('msgContainer');
                if(c)c.scrollTop=c.scrollHeight;
            },50);
        }

        function bindInput(){
            const inp=document.getElementById('msgInput');
            if(inp){inp.focus();inp.onkeypress=e=>{if(e.key==='Enter')sendMsg()}}
        }

        function filterChats(q){
            const items=document.querySelectorAll('.chat-item');
            const s=q.toLowerCase();
            items.forEach(i=>{i.style.display=i.querySelector('.chat-name').textContent.toLowerCase().includes(s)?'flex':'none'});
        }

        function newChatModal(){
            const m=document.createElement('div');
            m.className='modal active';m.id='ncModal';
            m.innerHTML=`<div class="modal-box">
                <h2>Новый чат <button onclick="closeMod('ncModal')">✕</button></h2>
                <div class="f-group"><input id="ncUser" placeholder="Username"></div>
                <div class="err" id="ncErr"></div>
                <button class="btn btn-accent" onclick="startChat()">Начать чат</button>
                <p style="color:var(--text2);font-size:11px;margin-top:10px;text-align:center">anna, petr, maria</p>
            </div>`;
            document.body.appendChild(m);
            m.onclick=e=>{if(e.target===m)closeMod('ncModal')};
        }

        function startChat(){
            const u=document.getElementById('ncUser').value.trim();
            const o=D.users.find(x=>x.username===u);
            const e=document.getElementById('ncErr');
            if(!o){e.textContent='Пользователь не найден';e.style.display='block';return}
            if(o.id===D.currentUser.id){e.textContent='Нельзя';e.style.display='block';return}
            const ex=D.chats.find(c=>c.participants.includes(D.currentUser.id)&&c.participants.includes(o.id));
            if(ex){openChat(ex.id);closeMod('ncModal');return}
            const nc={id:Date.now(),participants:[D.currentUser.id,o.id]};
            D.chats.push(nc);D.messages[nc.id]=[];save();
            openChat(nc.id);closeMod('ncModal');
        }

        function closeMod(id){const m=document.getElementById(id);if(m)m.remove()}

        function logout(){D.currentUser=null;D.activeChat=null;save();render()}

        function toggleSB(){document.getElementById('sidebar').classList.toggle('open')}

        // INIT
        load();
        window.addEventListener('DOMContentLoaded',()=>{
            setTimeout(render,100);
        });

        // Mobile sidebar toggle
        document.addEventListener('click',function(e){
            if(window.innerWidth<=768&&e.target.closest('.chat-item')){
                document.getElementById('sidebar').classList.remove('open');
            }
        });
    </script>
</body>
</html>
